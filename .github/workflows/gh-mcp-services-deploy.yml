        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ inputs.fetch_mcp_services_release_tag }}"
          SOURCE="${{ inputs.fetch_mcp_services_source }}"
          VERSION_DOTTED="${{ inputs.fetch_mcp_services_version_dotted }}"

          mkdir -p ./fetch_mcp_services
          if [ "$SOURCE" = "tag" ]; then
            echo "Error: fetch-mcp-services ${TAG} exists only as a git tag (no release)."
            echo "File-type apps require a release with compiled artifacts attached."
            echo "Please create a release at the upstream repo with the artifact matching: ${ARTIFACT_PATTERN}"
            exit 1
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
