            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./fetch_mcp_services
          fi

          MANIFEST_PATH="${FETCH_MCP_SERVICES_MANIFEST:-manifests/fetch_mcp_services/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: fetch-mcp-services manifest not found at ${MANIFEST_PATH}"
