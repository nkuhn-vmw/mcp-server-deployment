          DEPLOY_NAME="${FETCH_MCP_SERVICES_NAME}-${{ inputs.target_label }}-${VERSION}"
          ARTIFACT=$(ls ./fetch_mcp_services/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

