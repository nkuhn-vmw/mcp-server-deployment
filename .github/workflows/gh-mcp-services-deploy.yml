            echo "${{ inputs.web_mcp_services_release_tag }}" > ".last-deployed-${WEB_MCP_SERVICES_NAME}-${{ inputs.target_label }}"
            git add ".last-deployed-${WEB_MCP_SERVICES_NAME}-${{ inputs.target_label }}"
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            MSG="Record ${{ inputs.target_label }} deployment:"
            if [ "$DEPLOY_FETCH_MCP_SERVICES" = "true" ]; then
              MSG="${MSG} ${FETCH_MCP_SERVICES_NAME}=${{ inputs.fetch_mcp_services_release_tag }}"
            fi
            if [ "$DEPLOY_GH_MCP_SERVICES" = "true" ]; then
              MSG="${MSG} ${GH_MCP_SERVICES_NAME}=${{ inputs.gh_mcp_services_release_tag }}"
