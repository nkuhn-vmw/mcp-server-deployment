# AUTO-GENERATED by multi-app-setup-secrets.sh
# Generated on 2026-02-27
# App 1: fetch9 (secrets prefix: FETCH9_*)
# App 2: gh9 (secrets prefix: GH9_*)
# App 3: web9 (secrets prefix: WEB9_*)
#
name: Deploy t9-apps

# On-demand only — manually triggered from the Actions tab
on:
  workflow_dispatch:
    inputs:
      fetch9_release_tag:
        description: 'fetch9 release tag (e.g., v2.7.0)'
        required: false
        type: string
      gh9_release_tag:
        description: 'gh9 release tag (e.g., v2.7.0)'
        required: false
        type: string
      web9_release_tag:
        description: 'web9 release tag (e.g., v2.7.0)'
        required: false
        type: string
      deploy_fetch9:
        description: 'Deploy fetch9'
        required: false
        type: boolean
        default: true
      deploy_gh9:
        description: 'Deploy gh9'
        required: false
        type: boolean
        default: true
      deploy_web9:
        description: 'Deploy web9'
        required: false
        type: boolean
        default: true

permissions:
  contents: write
  actions: read
  deployments: write

env:
  CF_CLI_VERSION: "v8"

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Validate releases and prepare artifacts
  # ──────────────────────────────────────────────────────────────
  validate-and-prepare:
    runs-on: ubuntu-latest
    outputs:
      fetch9_release_tag: ${{ steps.validate.outputs.fetch9_release_tag }}
      fetch9_version: ${{ steps.validate.outputs.fetch9_version }}
      fetch9_version_dotted: ${{ steps.validate.outputs.fetch9_version_dotted }}
      fetch9_source: ${{ steps.validate.outputs.fetch9_source }}
      gh9_release_tag: ${{ steps.validate.outputs.gh9_release_tag }}
      gh9_version: ${{ steps.validate.outputs.gh9_version }}
      gh9_version_dotted: ${{ steps.validate.outputs.gh9_version_dotted }}
      gh9_source: ${{ steps.validate.outputs.gh9_source }}
      web9_release_tag: ${{ steps.validate.outputs.web9_release_tag }}
      web9_version: ${{ steps.validate.outputs.web9_version }}
      web9_version_dotted: ${{ steps.validate.outputs.web9_version_dotted }}
      web9_source: ${{ steps.validate.outputs.web9_source }}
      deploy_fetch9: ${{ steps.validate.outputs.deploy_fetch9 }}
      deploy_gh9: ${{ steps.validate.outputs.deploy_gh9 }}
      deploy_web9: ${{ steps.validate.outputs.deploy_web9 }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure GitHub Authentication
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -z "$GHE_TOKEN" ]; then
            echo "Error: GHE_TOKEN secret must be configured"
            exit 1
          fi

          if [ -n "$GHE_HOST" ]; then
            echo "${GHE_TOKEN}" | gh auth login --hostname "${GHE_HOST}" --with-token
            gh auth status --hostname "${GHE_HOST}"
            echo "Authenticated to GitHub Enterprise: ${GHE_HOST}"
          else
            echo "${GHE_TOKEN}" | gh auth login --with-token
            gh auth status
            echo "Authenticated to github.com"
          fi

      - name: Show configuration summary
        env:
          FETCH9_NAME: ${{ secrets.FETCH9_NAME }}
          FETCH9_UPSTREAM_REPO: ${{ secrets.FETCH9_UPSTREAM_REPO }}
          GH9_NAME: ${{ secrets.GH9_NAME }}
          GH9_UPSTREAM_REPO: ${{ secrets.GH9_UPSTREAM_REPO }}
          WEB9_NAME: ${{ secrets.WEB9_NAME }}
          WEB9_UPSTREAM_REPO: ${{ secrets.WEB9_UPSTREAM_REPO }}
        run: |
          echo "=========================================="
          echo "DEPLOYMENT CONFIGURATION"
          echo "=========================================="
          echo "fetch9 (fetch9_release_tag):  ${FETCH9_NAME}"
          echo "  Upstream repo:           ${FETCH9_UPSTREAM_REPO}"
          echo "  Deploy:                  ${{ inputs.deploy_fetch9 }}"
          echo "  Release tag:             ${{ inputs.fetch9_release_tag }}"
          echo "------------------------------------------"
          echo "gh9 (gh9_release_tag):  ${GH9_NAME}"
          echo "  Upstream repo:           ${GH9_UPSTREAM_REPO}"
          echo "  Deploy:                  ${{ inputs.deploy_gh9 }}"
          echo "  Release tag:             ${{ inputs.gh9_release_tag }}"
          echo "------------------------------------------"
          echo "web9 (web9_release_tag):  ${WEB9_NAME}"
          echo "  Upstream repo:           ${WEB9_UPSTREAM_REPO}"
          echo "  Deploy:                  ${{ inputs.deploy_web9 }}"
          echo "  Release tag:             ${{ inputs.web9_release_tag }}"
          echo "=========================================="

      - name: Validate inputs
        run: |
          DEPLOY_FETCH9="${{ inputs.deploy_fetch9 }}"
          FETCH9_TAG="${{ inputs.fetch9_release_tag }}"
          DEPLOY_GH9="${{ inputs.deploy_gh9 }}"
          GH9_TAG="${{ inputs.gh9_release_tag }}"
          DEPLOY_WEB9="${{ inputs.deploy_web9 }}"
          WEB9_TAG="${{ inputs.web9_release_tag }}"

          if [ "$DEPLOY_FETCH9" = "true" ] && [ -z "$FETCH9_TAG" ]; then
            echo "Error: fetch9_release_tag is required when deploy_fetch9 is enabled"
            exit 1
          fi
          if [ "$DEPLOY_GH9" = "true" ] && [ -z "$GH9_TAG" ]; then
            echo "Error: gh9_release_tag is required when deploy_gh9 is enabled"
            exit 1
          fi
          if [ "$DEPLOY_WEB9" = "true" ] && [ -z "$WEB9_TAG" ]; then
            echo "Error: web9_release_tag is required when deploy_web9 is enabled"
            exit 1
          fi
      - name: Validate releases
        id: validate
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          FETCH9_UPSTREAM_REPO: ${{ secrets.FETCH9_UPSTREAM_REPO }}
          GH9_UPSTREAM_REPO: ${{ secrets.GH9_UPSTREAM_REPO }}
          WEB9_UPSTREAM_REPO: ${{ secrets.WEB9_UPSTREAM_REPO }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          DEPLOY_FETCH9="${{ inputs.deploy_fetch9 }}"
          DEPLOY_GH9="${{ inputs.deploy_gh9 }}"
          DEPLOY_WEB9="${{ inputs.deploy_web9 }}"

          # Validate fetch9 release or tag
          if [ "$DEPLOY_FETCH9" = "true" ]; then
            FETCH9_TAG="${{ inputs.fetch9_release_tag }}"
            FETCH9_SOURCE="release"
            echo "Validating fetch9 release ${FETCH9_TAG} in ${FETCH9_UPSTREAM_REPO}..."

            # Try exact tag as release first
            RELEASE_INFO=$(gh api "repos/${FETCH9_UPSTREAM_REPO}/releases/tags/${FETCH9_TAG}" --jq '.tag_name' 2>&1) || {
              RELEASE_INFO=""
              # Try with 'v' prefix if tag doesn't start with 'v'
              if [[ "${FETCH9_TAG}" != v* ]]; then
                ALT_TAG="v${FETCH9_TAG}"
                echo "Release not found, trying ${ALT_TAG}..."
                RELEASE_INFO=$(gh api "repos/${FETCH9_UPSTREAM_REPO}/releases/tags/${ALT_TAG}" --jq '.tag_name' 2>&1) || RELEASE_INFO=""
              else
                # Try without 'v' prefix
                ALT_TAG="${FETCH9_TAG#v}"
                echo "Release not found, trying ${ALT_TAG}..."
                RELEASE_INFO=$(gh api "repos/${FETCH9_UPSTREAM_REPO}/releases/tags/${ALT_TAG}" --jq '.tag_name' 2>&1) || RELEASE_INFO=""
              fi
              # Fall back to searching releases by name
              if [ -z "$RELEASE_INFO" ]; then
                echo "Release variants not found, searching by release name..."
                RELEASE_INFO=$(gh api "repos/${FETCH9_UPSTREAM_REPO}/releases" --jq ".[] | select(.name == \"${FETCH9_TAG}\") | .tag_name" 2>&1 | head -1) || RELEASE_INFO=""
              fi
              # Fall back to checking if it exists as a plain git tag
              if [ -z "$RELEASE_INFO" ]; then
                echo "No release found, checking if git tag exists..."
                TAG_CHECK=$(gh api "repos/${FETCH9_UPSTREAM_REPO}/git/ref/tags/${FETCH9_TAG}" --jq '.ref' 2>&1) || TAG_CHECK=""
                if [ -z "$TAG_CHECK" ] && [[ "${FETCH9_TAG}" != v* ]]; then
                  TAG_CHECK=$(gh api "repos/${FETCH9_UPSTREAM_REPO}/git/ref/tags/v${FETCH9_TAG}" --jq '.ref' 2>&1) || TAG_CHECK=""
                  [ -n "$TAG_CHECK" ] && FETCH9_TAG="v${FETCH9_TAG}"
                elif [ -z "$TAG_CHECK" ] && [[ "${FETCH9_TAG}" == v* ]]; then
                  TAG_CHECK=$(gh api "repos/${FETCH9_UPSTREAM_REPO}/git/ref/tags/${FETCH9_TAG#v}" --jq '.ref' 2>&1) || TAG_CHECK=""
                  [ -n "$TAG_CHECK" ] && FETCH9_TAG="${FETCH9_TAG#v}"
                fi
                if [ -n "$TAG_CHECK" ]; then
                  echo "Found as git tag (no release): ${FETCH9_TAG}"
                  FETCH9_SOURCE="tag"
                  RELEASE_INFO="${FETCH9_TAG}"
                fi
              fi
              if [ -z "$RELEASE_INFO" ]; then
                echo "Error: ${FETCH9_TAG} not found in ${FETCH9_UPSTREAM_REPO}"
                echo "Tried: release tag, alternate format, release name, and git tag"
                exit 1
              fi
              FETCH9_TAG="$RELEASE_INFO"
            }
            echo "fetch9 validated: ${FETCH9_TAG} (source: ${FETCH9_SOURCE})"

            FETCH9_VERSION=${FETCH9_TAG#v}
            FETCH9_APP_VERSION=${FETCH9_VERSION//./-}
            echo "fetch9_release_tag=${FETCH9_TAG}" >> "$GITHUB_OUTPUT"
            echo "fetch9_version=${FETCH9_APP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "fetch9_version_dotted=${FETCH9_VERSION}" >> "$GITHUB_OUTPUT"
            echo "fetch9_source=${FETCH9_SOURCE}" >> "$GITHUB_OUTPUT"
          fi

          # Validate gh9 release or tag
          if [ "$DEPLOY_GH9" = "true" ]; then
            GH9_TAG="${{ inputs.gh9_release_tag }}"
            GH9_SOURCE="release"
            echo "Validating gh9 release ${GH9_TAG} in ${GH9_UPSTREAM_REPO}..."

            # Try exact tag as release first
            RELEASE_INFO=$(gh api "repos/${GH9_UPSTREAM_REPO}/releases/tags/${GH9_TAG}" --jq '.tag_name' 2>&1) || {
              RELEASE_INFO=""
              # Try with 'v' prefix if tag doesn't start with 'v'
              if [[ "${GH9_TAG}" != v* ]]; then
                ALT_TAG="v${GH9_TAG}"
                echo "Release not found, trying ${ALT_TAG}..."
                RELEASE_INFO=$(gh api "repos/${GH9_UPSTREAM_REPO}/releases/tags/${ALT_TAG}" --jq '.tag_name' 2>&1) || RELEASE_INFO=""
              else
                # Try without 'v' prefix
                ALT_TAG="${GH9_TAG#v}"
                echo "Release not found, trying ${ALT_TAG}..."
                RELEASE_INFO=$(gh api "repos/${GH9_UPSTREAM_REPO}/releases/tags/${ALT_TAG}" --jq '.tag_name' 2>&1) || RELEASE_INFO=""
              fi
              # Fall back to searching releases by name
              if [ -z "$RELEASE_INFO" ]; then
                echo "Release variants not found, searching by release name..."
                RELEASE_INFO=$(gh api "repos/${GH9_UPSTREAM_REPO}/releases" --jq ".[] | select(.name == \"${GH9_TAG}\") | .tag_name" 2>&1 | head -1) || RELEASE_INFO=""
              fi
              # Fall back to checking if it exists as a plain git tag
              if [ -z "$RELEASE_INFO" ]; then
                echo "No release found, checking if git tag exists..."
                TAG_CHECK=$(gh api "repos/${GH9_UPSTREAM_REPO}/git/ref/tags/${GH9_TAG}" --jq '.ref' 2>&1) || TAG_CHECK=""
                if [ -z "$TAG_CHECK" ] && [[ "${GH9_TAG}" != v* ]]; then
                  TAG_CHECK=$(gh api "repos/${GH9_UPSTREAM_REPO}/git/ref/tags/v${GH9_TAG}" --jq '.ref' 2>&1) || TAG_CHECK=""
                  [ -n "$TAG_CHECK" ] && GH9_TAG="v${GH9_TAG}"
                elif [ -z "$TAG_CHECK" ] && [[ "${GH9_TAG}" == v* ]]; then
                  TAG_CHECK=$(gh api "repos/${GH9_UPSTREAM_REPO}/git/ref/tags/${GH9_TAG#v}" --jq '.ref' 2>&1) || TAG_CHECK=""
                  [ -n "$TAG_CHECK" ] && GH9_TAG="${GH9_TAG#v}"
                fi
                if [ -n "$TAG_CHECK" ]; then
                  echo "Found as git tag (no release): ${GH9_TAG}"
                  GH9_SOURCE="tag"
                  RELEASE_INFO="${GH9_TAG}"
                fi
              fi
              if [ -z "$RELEASE_INFO" ]; then
                echo "Error: ${GH9_TAG} not found in ${GH9_UPSTREAM_REPO}"
                echo "Tried: release tag, alternate format, release name, and git tag"
                exit 1
              fi
              GH9_TAG="$RELEASE_INFO"
            }
            echo "gh9 validated: ${GH9_TAG} (source: ${GH9_SOURCE})"

            GH9_VERSION=${GH9_TAG#v}
            GH9_APP_VERSION=${GH9_VERSION//./-}
            echo "gh9_release_tag=${GH9_TAG}" >> "$GITHUB_OUTPUT"
            echo "gh9_version=${GH9_APP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "gh9_version_dotted=${GH9_VERSION}" >> "$GITHUB_OUTPUT"
            echo "gh9_source=${GH9_SOURCE}" >> "$GITHUB_OUTPUT"
          fi

          # Validate web9 release or tag
          if [ "$DEPLOY_WEB9" = "true" ]; then
            WEB9_TAG="${{ inputs.web9_release_tag }}"
            WEB9_SOURCE="release"
            echo "Validating web9 release ${WEB9_TAG} in ${WEB9_UPSTREAM_REPO}..."

            # Try exact tag as release first
            RELEASE_INFO=$(gh api "repos/${WEB9_UPSTREAM_REPO}/releases/tags/${WEB9_TAG}" --jq '.tag_name' 2>&1) || {
              RELEASE_INFO=""
              # Try with 'v' prefix if tag doesn't start with 'v'
              if [[ "${WEB9_TAG}" != v* ]]; then
                ALT_TAG="v${WEB9_TAG}"
                echo "Release not found, trying ${ALT_TAG}..."
                RELEASE_INFO=$(gh api "repos/${WEB9_UPSTREAM_REPO}/releases/tags/${ALT_TAG}" --jq '.tag_name' 2>&1) || RELEASE_INFO=""
              else
                # Try without 'v' prefix
                ALT_TAG="${WEB9_TAG#v}"
                echo "Release not found, trying ${ALT_TAG}..."
                RELEASE_INFO=$(gh api "repos/${WEB9_UPSTREAM_REPO}/releases/tags/${ALT_TAG}" --jq '.tag_name' 2>&1) || RELEASE_INFO=""
              fi
              # Fall back to searching releases by name
              if [ -z "$RELEASE_INFO" ]; then
                echo "Release variants not found, searching by release name..."
                RELEASE_INFO=$(gh api "repos/${WEB9_UPSTREAM_REPO}/releases" --jq ".[] | select(.name == \"${WEB9_TAG}\") | .tag_name" 2>&1 | head -1) || RELEASE_INFO=""
              fi
              # Fall back to checking if it exists as a plain git tag
              if [ -z "$RELEASE_INFO" ]; then
                echo "No release found, checking if git tag exists..."
                TAG_CHECK=$(gh api "repos/${WEB9_UPSTREAM_REPO}/git/ref/tags/${WEB9_TAG}" --jq '.ref' 2>&1) || TAG_CHECK=""
                if [ -z "$TAG_CHECK" ] && [[ "${WEB9_TAG}" != v* ]]; then
                  TAG_CHECK=$(gh api "repos/${WEB9_UPSTREAM_REPO}/git/ref/tags/v${WEB9_TAG}" --jq '.ref' 2>&1) || TAG_CHECK=""
                  [ -n "$TAG_CHECK" ] && WEB9_TAG="v${WEB9_TAG}"
                elif [ -z "$TAG_CHECK" ] && [[ "${WEB9_TAG}" == v* ]]; then
                  TAG_CHECK=$(gh api "repos/${WEB9_UPSTREAM_REPO}/git/ref/tags/${WEB9_TAG#v}" --jq '.ref' 2>&1) || TAG_CHECK=""
                  [ -n "$TAG_CHECK" ] && WEB9_TAG="${WEB9_TAG#v}"
                fi
                if [ -n "$TAG_CHECK" ]; then
                  echo "Found as git tag (no release): ${WEB9_TAG}"
                  WEB9_SOURCE="tag"
                  RELEASE_INFO="${WEB9_TAG}"
                fi
              fi
              if [ -z "$RELEASE_INFO" ]; then
                echo "Error: ${WEB9_TAG} not found in ${WEB9_UPSTREAM_REPO}"
                echo "Tried: release tag, alternate format, release name, and git tag"
                exit 1
              fi
              WEB9_TAG="$RELEASE_INFO"
            }
            echo "web9 validated: ${WEB9_TAG} (source: ${WEB9_SOURCE})"

            WEB9_VERSION=${WEB9_TAG#v}
            WEB9_APP_VERSION=${WEB9_VERSION//./-}
            echo "web9_release_tag=${WEB9_TAG}" >> "$GITHUB_OUTPUT"
            echo "web9_version=${WEB9_APP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "web9_version_dotted=${WEB9_VERSION}" >> "$GITHUB_OUTPUT"
            echo "web9_source=${WEB9_SOURCE}" >> "$GITHUB_OUTPUT"
          fi

          echo "deploy_fetch9=${DEPLOY_FETCH9}" >> "$GITHUB_OUTPUT"
          echo "deploy_gh9=${DEPLOY_GH9}" >> "$GITHUB_OUTPUT"
          echo "deploy_web9=${DEPLOY_WEB9}" >> "$GITHUB_OUTPUT"

  # ──────────────────────────────────────────────────────────────
  # Job 2: Deploy apps to Non-Production
  # ──────────────────────────────────────────────────────────────
  deploy-nonprod:
    needs: validate-and-prepare
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          curl -sL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=${{ env.CF_CLI_VERSION }}&source=github" | tar -zx
          chmod +x cf8

      - name: Authenticate to Nonprod CF
        env:
          CF_API: ${{ secrets.CF_NONPROD_API }}
          CF_USER: ${{ secrets.CF_NONPROD_USERNAME }}
          CF_PASS: ${{ secrets.CF_NONPROD_PASSWORD }}
          CF_ORG: ${{ secrets.CF_NONPROD_ORG }}
          CF_SPACE: ${{ secrets.CF_NONPROD_SPACE }}
        run: |
          ./cf8 api "$CF_API"
          ./cf8 auth "$CF_USER" "$CF_PASS"
          ./cf8 target -o "$CF_ORG" -s "$CF_SPACE"
          echo "Authenticated to Nonprod CF: ${CF_API}"

      - name: Configure GitHub Authentication
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            echo "${GHE_TOKEN}" | gh auth login --hostname "${GHE_HOST}" --with-token
          else
            echo "${GHE_TOKEN}" | gh auth login --with-token
          fi

      - name: Download fetch9 release assets
        if: needs.validate-and-prepare.outputs.deploy_fetch9 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.FETCH9_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.FETCH9_ARTIFACT_PATTERN }}
          FETCH9_MANIFEST: ${{ secrets.FETCH9_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ needs.validate-and-prepare.outputs.fetch9_release_tag }}"
          SOURCE="${{ needs.validate-and-prepare.outputs.fetch9_source }}"
          VERSION_DOTTED="${{ needs.validate-and-prepare.outputs.fetch9_version_dotted }}"

          mkdir -p ./fetch9
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading fetch9 source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./fetch9/source.tar.gz"
            echo "Extracting source archive..."
            mkdir -p ./fetch9/source-tmp
            tar -xzf "./fetch9/source.tar.gz" -C ./fetch9/source-tmp --strip-components=1
            rm "./fetch9/source.tar.gz"
            mv ./fetch9/source-tmp/* ./fetch9/ 2>/dev/null || true
            rm -rf ./fetch9/source-tmp
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading fetch9 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./fetch9
          fi

          MANIFEST_PATH="${FETCH9_MANIFEST:-manifests/fetch9/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: fetch9 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./fetch9/manifest.yml
          echo "fetch9 release assets and manifest ready:"
          ls -la ./fetch9/

      - name: Deploy fetch9 to Nonprod
        if: needs.validate-and-prepare.outputs.deploy_fetch9 == 'true'
        env:
          FETCH9_NAME: ${{ secrets.FETCH9_NAME }}
          VERSION: ${{ needs.validate-and-prepare.outputs.fetch9_version }}
          FETCH9_CF_ENV_JSON: ${{ secrets.FETCH9_CF_ENV_JSON }}
          FETCH9_ROUTE: ${{ secrets.FETCH9_NONPROD_ROUTE }}
        run: |
          DEPLOY_NAME="${FETCH9_NAME}-nonprod-${VERSION}"
          ARTIFACT=$(ls ./fetch9/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with environment-specific route
          sed -i "s|route:.*|route: ${FETCH9_ROUTE}|" ./fetch9/manifest.yml
          echo "Route set to: ${FETCH9_ROUTE}"

          if [ -n "$FETCH9_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch9/manifest.yml \
              -p "./fetch9/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${FETCH9_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch9/manifest.yml \
              -p "./fetch9/${ARTIFACT}"
          fi

          echo "fetch9 deployed to nonprod: ${DEPLOY_NAME}"

      - name: Download and extract gh9 release assets
        if: needs.validate-and-prepare.outputs.deploy_gh9 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.GH9_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.GH9_ARTIFACT_PATTERN }}
          GH9_MANIFEST: ${{ secrets.GH9_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ needs.validate-and-prepare.outputs.gh9_release_tag }}"
          SOURCE="${{ needs.validate-and-prepare.outputs.gh9_source }}"
          VERSION_DOTTED="${{ needs.validate-and-prepare.outputs.gh9_version_dotted }}"

          mkdir -p ./gh9
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading gh9 source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./gh9/source.tar.gz"
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading gh9 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./gh9
          fi

          ARCHIVE=$(ls ./gh9/ | head -1)
          echo "Extracting ${ARCHIVE}..."
          mkdir -p ./gh9/extracted
          if [[ "${ARCHIVE}" == *.tar.gz ]] || [[ "${ARCHIVE}" == *.tgz ]]; then
            tar -xzf "./gh9/${ARCHIVE}" -C ./gh9/extracted
          elif [[ "${ARCHIVE}" == *.zip ]]; then
            unzip -o "./gh9/${ARCHIVE}" -d ./gh9/extracted
          else
            echo "Error: Unknown archive format: ${ARCHIVE}"
            exit 1
          fi

          MANIFEST_PATH="${GH9_MANIFEST:-manifests/gh9/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: gh9 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./gh9/extracted/manifest.yml
          echo "gh9 extracted contents:"
          ls -la ./gh9/extracted/

      - name: Deploy gh9 to Nonprod
        if: needs.validate-and-prepare.outputs.deploy_gh9 == 'true'
        env:
          GH9_NAME: ${{ secrets.GH9_NAME }}
          VERSION: ${{ needs.validate-and-prepare.outputs.gh9_version }}
          GH9_CF_ENV_JSON: ${{ secrets.GH9_CF_ENV_JSON }}
          GH9_ROUTE: ${{ secrets.GH9_NONPROD_ROUTE }}
        run: |
          DEPLOY_NAME="${GH9_NAME}-nonprod-${VERSION}"
          echo "Deploying ${DEPLOY_NAME} from extracted directory..."

          # Override manifest route with environment-specific route
          sed -i "s|route:.*|route: ${GH9_ROUTE}|" ./gh9/extracted/manifest.yml
          echo "Route set to: ${GH9_ROUTE}"

          if [ -n "$GH9_CF_ENV_JSON" ]; then
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh9/extracted/manifest.yml \
              -p "./gh9/extracted" \
              --no-start

            echo "Setting env vars..."
            echo "${GH9_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh9/extracted/manifest.yml \
              -p "./gh9/extracted"
          fi

          echo "gh9 deployed to nonprod: ${DEPLOY_NAME}"

      - name: Download web9 release assets
        if: needs.validate-and-prepare.outputs.deploy_web9 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.WEB9_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.WEB9_ARTIFACT_PATTERN }}
          WEB9_MANIFEST: ${{ secrets.WEB9_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ needs.validate-and-prepare.outputs.web9_release_tag }}"
          SOURCE="${{ needs.validate-and-prepare.outputs.web9_source }}"
          VERSION_DOTTED="${{ needs.validate-and-prepare.outputs.web9_version_dotted }}"

          mkdir -p ./web9
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading web9 source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./web9/source.tar.gz"
            echo "Extracting source archive..."
            mkdir -p ./web9/source-tmp
            tar -xzf "./web9/source.tar.gz" -C ./web9/source-tmp --strip-components=1
            rm "./web9/source.tar.gz"
            mv ./web9/source-tmp/* ./web9/ 2>/dev/null || true
            rm -rf ./web9/source-tmp
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading web9 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./web9
          fi

          MANIFEST_PATH="${WEB9_MANIFEST:-manifests/web9/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: web9 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./web9/manifest.yml
          echo "web9 release assets and manifest ready:"
          ls -la ./web9/

      - name: Deploy web9 to Nonprod
        if: needs.validate-and-prepare.outputs.deploy_web9 == 'true'
        env:
          WEB9_NAME: ${{ secrets.WEB9_NAME }}
          VERSION: ${{ needs.validate-and-prepare.outputs.web9_version }}
          WEB9_CF_ENV_JSON: ${{ secrets.WEB9_CF_ENV_JSON }}
          WEB9_ROUTE: ${{ secrets.WEB9_NONPROD_ROUTE }}
        run: |
          DEPLOY_NAME="${WEB9_NAME}-nonprod-${VERSION}"
          ARTIFACT=$(ls ./web9/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with environment-specific route
          sed -i "s|route:.*|route: ${WEB9_ROUTE}|" ./web9/manifest.yml
          echo "Route set to: ${WEB9_ROUTE}"

          if [ -n "$WEB9_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web9/manifest.yml \
              -p "./web9/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${WEB9_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web9/manifest.yml \
              -p "./web9/${ARTIFACT}"
          fi

          echo "web9 deployed to nonprod: ${DEPLOY_NAME}"

      - name: Configure Authentication for git push
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@${GHE_HOST}/${{ github.repository }}.git"
          else
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@github.com/${{ github.repository }}.git"
          fi

      - name: Record nonprod deployed versions
        env:
          FETCH9_NAME: ${{ secrets.FETCH9_NAME }}
          GH9_NAME: ${{ secrets.GH9_NAME }}
          WEB9_NAME: ${{ secrets.WEB9_NAME }}
        run: |
          DEPLOY_FETCH9="${{ needs.validate-and-prepare.outputs.deploy_fetch9 }}"
          DEPLOY_GH9="${{ needs.validate-and-prepare.outputs.deploy_gh9 }}"
          DEPLOY_WEB9="${{ needs.validate-and-prepare.outputs.deploy_web9 }}"

          CHANGED=false

          if [ "$DEPLOY_FETCH9" = "true" ]; then
            echo "${{ needs.validate-and-prepare.outputs.fetch9_release_tag }}" > ".last-deployed-${FETCH9_NAME}-nonprod"
            git add ".last-deployed-${FETCH9_NAME}-nonprod"
            CHANGED=true
          fi

          if [ "$DEPLOY_GH9" = "true" ]; then
            echo "${{ needs.validate-and-prepare.outputs.gh9_release_tag }}" > ".last-deployed-${GH9_NAME}-nonprod"
            git add ".last-deployed-${GH9_NAME}-nonprod"
            CHANGED=true
          fi

          if [ "$DEPLOY_WEB9" = "true" ]; then
            echo "${{ needs.validate-and-prepare.outputs.web9_release_tag }}" > ".last-deployed-${WEB9_NAME}-nonprod"
            git add ".last-deployed-${WEB9_NAME}-nonprod"
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            MSG="Record nonprod deployment:"
            if [ "$DEPLOY_FETCH9" = "true" ]; then
              MSG="${MSG} ${FETCH9_NAME}=${{ needs.validate-and-prepare.outputs.fetch9_release_tag }}"
            fi
            if [ "$DEPLOY_GH9" = "true" ]; then
              MSG="${MSG} ${GH9_NAME}=${{ needs.validate-and-prepare.outputs.gh9_release_tag }}"
            fi
            if [ "$DEPLOY_WEB9" = "true" ]; then
              MSG="${MSG} ${WEB9_NAME}=${{ needs.validate-and-prepare.outputs.web9_release_tag }}"
            fi

            git diff --cached --quiet || git commit -m "${MSG}"
            git push
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 3: Send approval notification
  #
  # GitHub automatically emails environment reviewers when the
  # deploy-prod job reaches the 'production' environment gate.
  # This job creates an additional deployment notification for
  # broader visibility (repo watchers, team channels, etc).
  # ──────────────────────────────────────────────────────────────
  notify-approval-required:
    needs: [validate-and-prepare, deploy-nonprod]
    runs-on: ubuntu-latest
    steps:
      - name: Configure GitHub Authentication
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            echo "${GHE_TOKEN}" | gh auth login --hostname "${GHE_HOST}" --with-token
          else
            echo "${GHE_TOKEN}" | gh auth login --with-token
          fi

      - name: Send deployment approval notification
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          APPROVAL_REVIEWERS: ${{ secrets.APPROVAL_REVIEWERS }}
          FETCH9_NAME: ${{ secrets.FETCH9_NAME }}
          GH9_NAME: ${{ secrets.GH9_NAME }}
          WEB9_NAME: ${{ secrets.WEB9_NAME }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          DEPLOY_FETCH9="${{ needs.validate-and-prepare.outputs.deploy_fetch9 }}"

          DEPLOY_GH9="${{ needs.validate-and-prepare.outputs.deploy_gh9 }}"

          DEPLOY_WEB9="${{ needs.validate-and-prepare.outputs.deploy_web9 }}"

          # Build description of what's being deployed
          APPS_LIST=""
          if [ "$DEPLOY_FETCH9" = "true" ]; then
            FETCH9_TAG="${{ needs.validate-and-prepare.outputs.fetch9_release_tag }}"
            if [ -n "$APPS_LIST" ]; then APPS_LIST="${APPS_LIST}, "; fi
            APPS_LIST="${APPS_LIST}${FETCH9_NAME} (${FETCH9_TAG})"
          fi
          if [ "$DEPLOY_GH9" = "true" ]; then
            GH9_TAG="${{ needs.validate-and-prepare.outputs.gh9_release_tag }}"
            if [ -n "$APPS_LIST" ]; then APPS_LIST="${APPS_LIST}, "; fi
            APPS_LIST="${APPS_LIST}${GH9_NAME} (${GH9_TAG})"
          fi
          if [ "$DEPLOY_WEB9" = "true" ]; then
            WEB9_TAG="${{ needs.validate-and-prepare.outputs.web9_release_tag }}"
            if [ -n "$APPS_LIST" ]; then APPS_LIST="${APPS_LIST}, "; fi
            APPS_LIST="${APPS_LIST}${WEB9_NAME} (${WEB9_TAG})"
          fi

          # Build reviewer mentions for notification
          REVIEWERS_MENTION=""
          if [ -n "$APPROVAL_REVIEWERS" ]; then
            IFS=',' read -ra REVIEWERS <<< "$APPROVAL_REVIEWERS"
            for reviewer in "${REVIEWERS[@]}"; do
              reviewer=$(echo "$reviewer" | xargs)
              REVIEWERS_MENTION="${REVIEWERS_MENTION}@${reviewer} "
            done
          fi

          DESCRIPTION="Production deployment approval required. Apps: ${APPS_LIST}. Review: ${RUN_URL} ${REVIEWERS_MENTION}"

          echo "=========================================="
          echo "PRODUCTION DEPLOYMENT APPROVAL REQUIRED"
          echo "=========================================="
          echo "Apps:       ${APPS_LIST}"
          echo "Approve at: ${RUN_URL}"
          echo "Reviewers:  ${APPROVAL_REVIEWERS}"
          echo "=========================================="

          # Create a deployment event via GitHub API to trigger email notifications
          gh api "repos/${{ github.repository }}/deployments" \
            --input - <<DEPEOF || echo "::warning::Could not create deployment notification (non-blocking)"
          {
            "ref": "${{ github.sha }}",
            "environment": "production-pending",
            "description": "${DESCRIPTION}",
            "auto_merge": false,
            "required_contexts": []
          }
          DEPEOF

  # ──────────────────────────────────────────────────────────────
  # Job 4: Deploy apps to Production
  #
  # Gated by the 'production' environment which requires manual
  # approval. GitHub sends email to configured reviewers asking
  # them to approve or reject the deployment.
  #
  # To configure the approval gate:
  #   1. Go to Settings > Environments > New environment > "production"
  #   2. Enable "Required reviewers"
  #   3. Add the users/teams who should approve prod deployments
  #   4. GitHub will email those reviewers when this job is reached
  # ──────────────────────────────────────────────────────────────
  deploy-prod:
    needs: [validate-and-prepare, deploy-nonprod]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          curl -sL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=${{ env.CF_CLI_VERSION }}&source=github" | tar -zx
          chmod +x cf8

      - name: Authenticate to Prod CF
        env:
          CF_API: ${{ secrets.CF_PROD_API }}
          CF_USER: ${{ secrets.CF_PROD_USERNAME }}
          CF_PASS: ${{ secrets.CF_PROD_PASSWORD }}
          CF_ORG: ${{ secrets.CF_PROD_ORG }}
          CF_SPACE: ${{ secrets.CF_PROD_SPACE }}
        run: |
          ./cf8 api "$CF_API"
          ./cf8 auth "$CF_USER" "$CF_PASS"
          ./cf8 target -o "$CF_ORG" -s "$CF_SPACE"
          echo "Authenticated to Prod CF: ${CF_API}"

      - name: Configure GitHub Authentication
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            echo "${GHE_TOKEN}" | gh auth login --hostname "${GHE_HOST}" --with-token
          else
            echo "${GHE_TOKEN}" | gh auth login --with-token
          fi

      - name: Download fetch9 release assets
        if: needs.validate-and-prepare.outputs.deploy_fetch9 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.FETCH9_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.FETCH9_ARTIFACT_PATTERN }}
          FETCH9_MANIFEST: ${{ secrets.FETCH9_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ needs.validate-and-prepare.outputs.fetch9_release_tag }}"
          SOURCE="${{ needs.validate-and-prepare.outputs.fetch9_source }}"
          VERSION_DOTTED="${{ needs.validate-and-prepare.outputs.fetch9_version_dotted }}"

          mkdir -p ./fetch9
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading fetch9 source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./fetch9/source.tar.gz"
            echo "Extracting source archive..."
            mkdir -p ./fetch9/source-tmp
            tar -xzf "./fetch9/source.tar.gz" -C ./fetch9/source-tmp --strip-components=1
            rm "./fetch9/source.tar.gz"
            mv ./fetch9/source-tmp/* ./fetch9/ 2>/dev/null || true
            rm -rf ./fetch9/source-tmp
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading fetch9 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./fetch9
          fi

          MANIFEST_PATH="${FETCH9_MANIFEST:-manifests/fetch9/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: fetch9 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./fetch9/manifest.yml
          echo "fetch9 release assets and manifest ready:"
          ls -la ./fetch9/

      - name: Deploy fetch9 to Prod
        if: needs.validate-and-prepare.outputs.deploy_fetch9 == 'true'
        env:
          FETCH9_NAME: ${{ secrets.FETCH9_NAME }}
          VERSION: ${{ needs.validate-and-prepare.outputs.fetch9_version }}
          FETCH9_CF_ENV_JSON: ${{ secrets.FETCH9_CF_ENV_JSON }}
          FETCH9_ROUTE: ${{ secrets.FETCH9_PROD_ROUTE }}
        run: |
          DEPLOY_NAME="${FETCH9_NAME}-prod-${VERSION}"
          ARTIFACT=$(ls ./fetch9/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with environment-specific route
          sed -i "s|route:.*|route: ${FETCH9_ROUTE}|" ./fetch9/manifest.yml
          echo "Route set to: ${FETCH9_ROUTE}"

          if [ -n "$FETCH9_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch9/manifest.yml \
              -p "./fetch9/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${FETCH9_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch9/manifest.yml \
              -p "./fetch9/${ARTIFACT}"
          fi

          echo "fetch9 deployed to prod: ${DEPLOY_NAME}"

      - name: Download and extract gh9 release assets
        if: needs.validate-and-prepare.outputs.deploy_gh9 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.GH9_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.GH9_ARTIFACT_PATTERN }}
          GH9_MANIFEST: ${{ secrets.GH9_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ needs.validate-and-prepare.outputs.gh9_release_tag }}"
          SOURCE="${{ needs.validate-and-prepare.outputs.gh9_source }}"
          VERSION_DOTTED="${{ needs.validate-and-prepare.outputs.gh9_version_dotted }}"

          mkdir -p ./gh9
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading gh9 source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./gh9/source.tar.gz"
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading gh9 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./gh9
          fi

          ARCHIVE=$(ls ./gh9/ | head -1)
          echo "Extracting ${ARCHIVE}..."
          mkdir -p ./gh9/extracted
          if [[ "${ARCHIVE}" == *.tar.gz ]] || [[ "${ARCHIVE}" == *.tgz ]]; then
            tar -xzf "./gh9/${ARCHIVE}" -C ./gh9/extracted
          elif [[ "${ARCHIVE}" == *.zip ]]; then
            unzip -o "./gh9/${ARCHIVE}" -d ./gh9/extracted
          else
            echo "Error: Unknown archive format: ${ARCHIVE}"
            exit 1
          fi

          MANIFEST_PATH="${GH9_MANIFEST:-manifests/gh9/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: gh9 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./gh9/extracted/manifest.yml
          echo "gh9 extracted contents:"
          ls -la ./gh9/extracted/

      - name: Deploy gh9 to Prod
        if: needs.validate-and-prepare.outputs.deploy_gh9 == 'true'
        env:
          GH9_NAME: ${{ secrets.GH9_NAME }}
          VERSION: ${{ needs.validate-and-prepare.outputs.gh9_version }}
          GH9_CF_ENV_JSON: ${{ secrets.GH9_CF_ENV_JSON }}
          GH9_ROUTE: ${{ secrets.GH9_PROD_ROUTE }}
        run: |
          DEPLOY_NAME="${GH9_NAME}-prod-${VERSION}"
          echo "Deploying ${DEPLOY_NAME} from extracted directory..."

          # Override manifest route with environment-specific route
          sed -i "s|route:.*|route: ${GH9_ROUTE}|" ./gh9/extracted/manifest.yml
          echo "Route set to: ${GH9_ROUTE}"

          if [ -n "$GH9_CF_ENV_JSON" ]; then
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh9/extracted/manifest.yml \
              -p "./gh9/extracted" \
              --no-start

            echo "Setting env vars..."
            echo "${GH9_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh9/extracted/manifest.yml \
              -p "./gh9/extracted"
          fi

          echo "gh9 deployed to prod: ${DEPLOY_NAME}"

      - name: Download web9 release assets
        if: needs.validate-and-prepare.outputs.deploy_web9 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.WEB9_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.WEB9_ARTIFACT_PATTERN }}
          WEB9_MANIFEST: ${{ secrets.WEB9_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ needs.validate-and-prepare.outputs.web9_release_tag }}"
          SOURCE="${{ needs.validate-and-prepare.outputs.web9_source }}"
          VERSION_DOTTED="${{ needs.validate-and-prepare.outputs.web9_version_dotted }}"

          mkdir -p ./web9
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading web9 source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./web9/source.tar.gz"
            echo "Extracting source archive..."
            mkdir -p ./web9/source-tmp
            tar -xzf "./web9/source.tar.gz" -C ./web9/source-tmp --strip-components=1
            rm "./web9/source.tar.gz"
            mv ./web9/source-tmp/* ./web9/ 2>/dev/null || true
            rm -rf ./web9/source-tmp
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading web9 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./web9
          fi

          MANIFEST_PATH="${WEB9_MANIFEST:-manifests/web9/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: web9 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./web9/manifest.yml
          echo "web9 release assets and manifest ready:"
          ls -la ./web9/

      - name: Deploy web9 to Prod
        if: needs.validate-and-prepare.outputs.deploy_web9 == 'true'
        env:
          WEB9_NAME: ${{ secrets.WEB9_NAME }}
          VERSION: ${{ needs.validate-and-prepare.outputs.web9_version }}
          WEB9_CF_ENV_JSON: ${{ secrets.WEB9_CF_ENV_JSON }}
          WEB9_ROUTE: ${{ secrets.WEB9_PROD_ROUTE }}
        run: |
          DEPLOY_NAME="${WEB9_NAME}-prod-${VERSION}"
          ARTIFACT=$(ls ./web9/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with environment-specific route
          sed -i "s|route:.*|route: ${WEB9_ROUTE}|" ./web9/manifest.yml
          echo "Route set to: ${WEB9_ROUTE}"

          if [ -n "$WEB9_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web9/manifest.yml \
              -p "./web9/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${WEB9_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web9/manifest.yml \
              -p "./web9/${ARTIFACT}"
          fi

          echo "web9 deployed to prod: ${DEPLOY_NAME}"

      - name: Configure Authentication for git push
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@${GHE_HOST}/${{ github.repository }}.git"
          else
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@github.com/${{ github.repository }}.git"
          fi

      - name: Record prod deployed versions
        env:
          FETCH9_NAME: ${{ secrets.FETCH9_NAME }}
          GH9_NAME: ${{ secrets.GH9_NAME }}
          WEB9_NAME: ${{ secrets.WEB9_NAME }}
        run: |
          DEPLOY_FETCH9="${{ needs.validate-and-prepare.outputs.deploy_fetch9 }}"
          DEPLOY_GH9="${{ needs.validate-and-prepare.outputs.deploy_gh9 }}"
          DEPLOY_WEB9="${{ needs.validate-and-prepare.outputs.deploy_web9 }}"

          CHANGED=false

          git pull --rebase

          if [ "$DEPLOY_FETCH9" = "true" ]; then
            echo "${{ needs.validate-and-prepare.outputs.fetch9_release_tag }}" > ".last-deployed-${FETCH9_NAME}-prod"
            git add ".last-deployed-${FETCH9_NAME}-prod"
            CHANGED=true
          fi

          if [ "$DEPLOY_GH9" = "true" ]; then
            echo "${{ needs.validate-and-prepare.outputs.gh9_release_tag }}" > ".last-deployed-${GH9_NAME}-prod"
            git add ".last-deployed-${GH9_NAME}-prod"
            CHANGED=true
          fi

          if [ "$DEPLOY_WEB9" = "true" ]; then
            echo "${{ needs.validate-and-prepare.outputs.web9_release_tag }}" > ".last-deployed-${WEB9_NAME}-prod"
            git add ".last-deployed-${WEB9_NAME}-prod"
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            MSG="Record prod deployment:"
            if [ "$DEPLOY_FETCH9" = "true" ]; then
              MSG="${MSG} ${FETCH9_NAME}=${{ needs.validate-and-prepare.outputs.fetch9_release_tag }}"
            fi
            if [ "$DEPLOY_GH9" = "true" ]; then
              MSG="${MSG} ${GH9_NAME}=${{ needs.validate-and-prepare.outputs.gh9_release_tag }}"
            fi
            if [ "$DEPLOY_WEB9" = "true" ]; then
              MSG="${MSG} ${WEB9_NAME}=${{ needs.validate-and-prepare.outputs.web9_release_tag }}"
            fi

            git diff --cached --quiet || git commit -m "${MSG}"
            git push
          fi
