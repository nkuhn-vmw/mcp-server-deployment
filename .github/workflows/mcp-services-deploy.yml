# AUTO-GENERATED by multi-target-setup.sh
# Generated on 2026-03-09
# Reusable deploy workflow for: mcp-services
# App 1: fetch-mcp (file)
# App 2: gh-mcp (archive)
# App 3: web-mcp (file)
#
name: mcp-services - Deploy Pack

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      target_label:
        required: true
        type: string
      fetch_mcp_release_tag:
        required: true
        type: string
      fetch_mcp_version:
        required: true
        type: string
      fetch_mcp_version_dotted:
        required: true
        type: string
      fetch_mcp_source:
        required: true
        type: string
      deploy_fetch_mcp:
        required: true
        type: string
      gh_mcp_release_tag:
        required: true
        type: string
      gh_mcp_version:
        required: true
        type: string
      gh_mcp_version_dotted:
        required: true
        type: string
      gh_mcp_source:
        required: true
        type: string
      deploy_gh_mcp:
        required: true
        type: string
      web_mcp_release_tag:
        required: true
        type: string
      web_mcp_version:
        required: true
        type: string
      web_mcp_version_dotted:
        required: true
        type: string
      web_mcp_source:
        required: true
        type: string
      deploy_web_mcp:
        required: true
        type: string

permissions:
  contents: write
  actions: read

env:
  CF_CLI_VERSION: "v8"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          curl -sL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=${{ env.CF_CLI_VERSION }}&source=github" | tar -zx
          chmod +x cf8

      - name: Authenticate to CF
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USER: ${{ secrets.CF_USERNAME }}
          CF_PASS: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
        run: |
          ./cf8 api "$CF_API"
          ./cf8 auth "$CF_USER" "$CF_PASS"
          ./cf8 target -o "$CF_ORG" -s "$CF_SPACE"
          echo "Authenticated to CF: ${CF_API} (org: ${CF_ORG}, space: ${CF_SPACE})"

      - name: Configure GitHub Authentication
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            echo "${GHE_TOKEN}" | gh auth login --hostname "${GHE_HOST}" --with-token
          else
            echo "${GHE_TOKEN}" | gh auth login --with-token
          fi

      - name: Download fetch-mcp release assets
        if: inputs.deploy_fetch_mcp == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.FETCH_MCP_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.FETCH_MCP_ARTIFACT_PATTERN }}
          FETCH_MCP_MANIFEST: ${{ secrets.FETCH_MCP_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ inputs.fetch_mcp_release_tag }}"
          SOURCE="${{ inputs.fetch_mcp_source }}"
          VERSION_DOTTED="${{ inputs.fetch_mcp_version_dotted }}"

          mkdir -p ./fetch_mcp
          if [ "$SOURCE" = "tag" ]; then
            echo "Error: fetch-mcp ${TAG} exists only as a git tag (no release)."
            echo "File-type apps require a release with compiled artifacts attached."
            echo "Please create a release at the upstream repo with the artifact matching: ${ARTIFACT_PATTERN}"
            exit 1
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading fetch-mcp release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./fetch_mcp
          fi

          MANIFEST_PATH="${FETCH_MCP_MANIFEST:-manifests/fetch_mcp/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: fetch-mcp manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./fetch_mcp/manifest.yml
          echo "fetch-mcp release assets and manifest ready:"
          ls -la ./fetch_mcp/

      - name: Deploy fetch-mcp to ${{ inputs.target_label }}
        if: inputs.deploy_fetch_mcp == 'true'
        env:
          FETCH_MCP_NAME: ${{ secrets.FETCH_MCP_NAME }}
          VERSION: ${{ inputs.fetch_mcp_version }}
          FETCH_MCP_CF_ENV_JSON: ${{ secrets.FETCH_MCP_CF_ENV_JSON }}
          FETCH_MCP_ROUTE: ${{ secrets.FETCH_MCP_ROUTE }}
        run: |
          DEPLOY_NAME="${FETCH_MCP_NAME}-${{ inputs.target_label }}-${VERSION}"
          ARTIFACT=$(ls ./fetch_mcp/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with target-specific route
          sed -i "s|route:.*|route: ${FETCH_MCP_ROUTE}|" ./fetch_mcp/manifest.yml
          echo "Route set to: ${FETCH_MCP_ROUTE}"

          if [ -n "$FETCH_MCP_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch_mcp/manifest.yml \
              -p "./fetch_mcp/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${FETCH_MCP_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch_mcp/manifest.yml \
              -p "./fetch_mcp/${ARTIFACT}"
          fi

          echo "fetch-mcp deployed: ${DEPLOY_NAME}"

      - name: Download and extract gh-mcp release assets
        if: inputs.deploy_gh_mcp == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.GH_MCP_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.GH_MCP_ARTIFACT_PATTERN }}
          GH_MCP_MANIFEST: ${{ secrets.GH_MCP_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ inputs.gh_mcp_release_tag }}"
          SOURCE="${{ inputs.gh_mcp_source }}"
          VERSION_DOTTED="${{ inputs.gh_mcp_version_dotted }}"

          mkdir -p ./gh_mcp
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading gh-mcp source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./gh_mcp/source.tar.gz"
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading gh-mcp release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./gh_mcp
          fi

          ARCHIVE=$(ls ./gh_mcp/ | head -1)
          echo "Extracting ${ARCHIVE}..."
          mkdir -p ./gh_mcp/extracted
          if [[ "${ARCHIVE}" == *.tar.gz ]] || [[ "${ARCHIVE}" == *.tgz ]]; then
            tar -xzf "./gh_mcp/${ARCHIVE}" -C ./gh_mcp/extracted
          elif [[ "${ARCHIVE}" == *.zip ]]; then
            unzip -o "./gh_mcp/${ARCHIVE}" -d ./gh_mcp/extracted
          else
            echo "Error: Unknown archive format: ${ARCHIVE}"
            exit 1
          fi

          MANIFEST_PATH="${GH_MCP_MANIFEST:-manifests/gh_mcp/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: gh-mcp manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./gh_mcp/extracted/manifest.yml
          echo "gh-mcp extracted contents:"
          ls -la ./gh_mcp/extracted/

      - name: Deploy gh-mcp to ${{ inputs.target_label }}
        if: inputs.deploy_gh_mcp == 'true'
        env:
          GH_MCP_NAME: ${{ secrets.GH_MCP_NAME }}
          VERSION: ${{ inputs.gh_mcp_version }}
          GH_MCP_CF_ENV_JSON: ${{ secrets.GH_MCP_CF_ENV_JSON }}
          GH_MCP_ROUTE: ${{ secrets.GH_MCP_ROUTE }}
        run: |
          DEPLOY_NAME="${GH_MCP_NAME}-${{ inputs.target_label }}-${VERSION}"
          echo "Deploying ${DEPLOY_NAME} from extracted directory..."

          # Override manifest route with target-specific route
          sed -i "s|route:.*|route: ${GH_MCP_ROUTE}|" ./gh_mcp/extracted/manifest.yml
          echo "Route set to: ${GH_MCP_ROUTE}"

          if [ -n "$GH_MCP_CF_ENV_JSON" ]; then
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh_mcp/extracted/manifest.yml \
              -p "./gh_mcp/extracted" \
              --no-start

            echo "Setting env vars..."
            echo "${GH_MCP_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh_mcp/extracted/manifest.yml \
              -p "./gh_mcp/extracted"
          fi

          echo "gh-mcp deployed: ${DEPLOY_NAME}"

      - name: Download web-mcp release assets
        if: inputs.deploy_web_mcp == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.WEB_MCP_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.WEB_MCP_ARTIFACT_PATTERN }}
          WEB_MCP_MANIFEST: ${{ secrets.WEB_MCP_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ inputs.web_mcp_release_tag }}"
          SOURCE="${{ inputs.web_mcp_source }}"
          VERSION_DOTTED="${{ inputs.web_mcp_version_dotted }}"

          mkdir -p ./web_mcp
          if [ "$SOURCE" = "tag" ]; then
            echo "Error: web-mcp ${TAG} exists only as a git tag (no release)."
            echo "File-type apps require a release with compiled artifacts attached."
            echo "Please create a release at the upstream repo with the artifact matching: ${ARTIFACT_PATTERN}"
            exit 1
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading web-mcp release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./web_mcp
          fi

          MANIFEST_PATH="${WEB_MCP_MANIFEST:-manifests/web_mcp/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: web-mcp manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./web_mcp/manifest.yml
          echo "web-mcp release assets and manifest ready:"
          ls -la ./web_mcp/

      - name: Deploy web-mcp to ${{ inputs.target_label }}
        if: inputs.deploy_web_mcp == 'true'
        env:
          WEB_MCP_NAME: ${{ secrets.WEB_MCP_NAME }}
          VERSION: ${{ inputs.web_mcp_version }}
          WEB_MCP_CF_ENV_JSON: ${{ secrets.WEB_MCP_CF_ENV_JSON }}
          WEB_MCP_ROUTE: ${{ secrets.WEB_MCP_ROUTE }}
        run: |
          DEPLOY_NAME="${WEB_MCP_NAME}-${{ inputs.target_label }}-${VERSION}"
          ARTIFACT=$(ls ./web_mcp/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with target-specific route
          sed -i "s|route:.*|route: ${WEB_MCP_ROUTE}|" ./web_mcp/manifest.yml
          echo "Route set to: ${WEB_MCP_ROUTE}"

          if [ -n "$WEB_MCP_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web_mcp/manifest.yml \
              -p "./web_mcp/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${WEB_MCP_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web_mcp/manifest.yml \
              -p "./web_mcp/${ARTIFACT}"
          fi

          echo "web-mcp deployed: ${DEPLOY_NAME}"

      - name: Run post-deploy script
        env:
          POST_DEPLOY_SCRIPT: ${{ secrets.POST_DEPLOY_SCRIPT }}
          TARGET_LABEL: ${{ inputs.target_label }}
          DEPLOY_FETCH_MCP: ${{ inputs.deploy_fetch_mcp }}
          FETCH_MCP_NAME: ${{ secrets.FETCH_MCP_NAME }}
          FETCH_MCP_VERSION: ${{ inputs.fetch_mcp_version }}
          DEPLOY_GH_MCP: ${{ inputs.deploy_gh_mcp }}
          GH_MCP_NAME: ${{ secrets.GH_MCP_NAME }}
          GH_MCP_VERSION: ${{ inputs.gh_mcp_version }}
          DEPLOY_WEB_MCP: ${{ inputs.deploy_web_mcp }}
          WEB_MCP_NAME: ${{ secrets.WEB_MCP_NAME }}
          WEB_MCP_VERSION: ${{ inputs.web_mcp_version }}
        run: |
          if [ -z "$POST_DEPLOY_SCRIPT" ] || [ ! -f "$POST_DEPLOY_SCRIPT" ]; then
            echo "No post-deploy script configured, skipping"
            exit 0
          fi

          # Build list of deployed app names for the script
          DEPLOYED_APPS=""
          if [ "$DEPLOY_FETCH_MCP" = "true" ]; then
            DEPLOYED_APPS="${DEPLOYED_APPS} ${FETCH_MCP_NAME}-${TARGET_LABEL}-${FETCH_MCP_VERSION}"
          fi
          if [ "$DEPLOY_GH_MCP" = "true" ]; then
            DEPLOYED_APPS="${DEPLOYED_APPS} ${GH_MCP_NAME}-${TARGET_LABEL}-${GH_MCP_VERSION}"
          fi
          if [ "$DEPLOY_WEB_MCP" = "true" ]; then
            DEPLOYED_APPS="${DEPLOYED_APPS} ${WEB_MCP_NAME}-${TARGET_LABEL}-${WEB_MCP_VERSION}"
          fi

          export DEPLOYED_APPS="${DEPLOYED_APPS# }"
          export TARGET_LABEL

          chmod +x "$POST_DEPLOY_SCRIPT"
          echo "Running post-deploy script: ${POST_DEPLOY_SCRIPT}"
          echo "  Target: ${TARGET_LABEL}"
          echo "  Deployed apps: ${DEPLOYED_APPS}"
          ./"$POST_DEPLOY_SCRIPT"

      - name: Configure Authentication for git push
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@${GHE_HOST}/${{ github.repository }}.git"
          else
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@github.com/${{ github.repository }}.git"
          fi

      - name: Record ${{ inputs.target_label }} deployed versions
        env:
          FETCH_MCP_NAME: ${{ secrets.FETCH_MCP_NAME }}
          GH_MCP_NAME: ${{ secrets.GH_MCP_NAME }}
          WEB_MCP_NAME: ${{ secrets.WEB_MCP_NAME }}
        run: |
          DEPLOY_FETCH_MCP="${{ inputs.deploy_fetch_mcp }}"
          DEPLOY_GH_MCP="${{ inputs.deploy_gh_mcp }}"
          DEPLOY_WEB_MCP="${{ inputs.deploy_web_mcp }}"

          CHANGED=false
          TRACK_FILE=".last-deployed-mcp-services"

          git pull --rebase || true
          touch "$TRACK_FILE"

          if [ "$DEPLOY_FETCH_MCP" = "true" ]; then
            grep -v "^${{ inputs.target_label }} ${FETCH_MCP_NAME} " "$TRACK_FILE" > "${TRACK_FILE}.tmp" || true
            echo "${{ inputs.target_label }} ${FETCH_MCP_NAME} ${{ inputs.fetch_mcp_release_tag }} $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "${TRACK_FILE}.tmp"
            sort -o "$TRACK_FILE" "${TRACK_FILE}.tmp"
            rm -f "${TRACK_FILE}.tmp"
            CHANGED=true
          fi

          if [ "$DEPLOY_GH_MCP" = "true" ]; then
            grep -v "^${{ inputs.target_label }} ${GH_MCP_NAME} " "$TRACK_FILE" > "${TRACK_FILE}.tmp" || true
            echo "${{ inputs.target_label }} ${GH_MCP_NAME} ${{ inputs.gh_mcp_release_tag }} $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "${TRACK_FILE}.tmp"
            sort -o "$TRACK_FILE" "${TRACK_FILE}.tmp"
            rm -f "${TRACK_FILE}.tmp"
            CHANGED=true
          fi

          if [ "$DEPLOY_WEB_MCP" = "true" ]; then
            grep -v "^${{ inputs.target_label }} ${WEB_MCP_NAME} " "$TRACK_FILE" > "${TRACK_FILE}.tmp" || true
            echo "${{ inputs.target_label }} ${WEB_MCP_NAME} ${{ inputs.web_mcp_release_tag }} $(date -u '+%Y-%m-%dT%H:%M:%SZ')" >> "${TRACK_FILE}.tmp"
            sort -o "$TRACK_FILE" "${TRACK_FILE}.tmp"
            rm -f "${TRACK_FILE}.tmp"
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git add "$TRACK_FILE"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            MSG="Record ${{ inputs.target_label }} deployment:"
            if [ "$DEPLOY_FETCH_MCP" = "true" ]; then
              MSG="${MSG} ${FETCH_MCP_NAME}=${{ inputs.fetch_mcp_release_tag }}"
            fi
            if [ "$DEPLOY_GH_MCP" = "true" ]; then
              MSG="${MSG} ${GH_MCP_NAME}=${{ inputs.gh_mcp_release_tag }}"
            fi
            if [ "$DEPLOY_WEB_MCP" = "true" ]; then
              MSG="${MSG} ${WEB_MCP_NAME}=${{ inputs.web_mcp_release_tag }}"
            fi

            git diff --cached --quiet || git commit -m "${MSG}"

            # Retry push in case parallel prod deployments conflict
            MAX_RETRIES=3
            for attempt in $(seq 1 $MAX_RETRIES); do
              if git push; then
                echo "Version tracking pushed (attempt $attempt)"
                break
              fi
              if [ $attempt -eq $MAX_RETRIES ]; then
                echo "::warning::Could not push version tracking after $MAX_RETRIES attempts"
              else
                echo "Push failed, retrying after pull..."
                sleep $((attempt * 2))
                git pull --rebase || true
              fi
            done
          fi
