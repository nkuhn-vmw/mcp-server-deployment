  validate-and-prepare:
    runs-on: ubuntu-latest
    outputs:
      fetch_p1_release_tag: ${{ steps.validate.outputs.fetch_p1_release_tag }}
      fetch_p1_version: ${{ steps.validate.outputs.fetch_p1_version }}
