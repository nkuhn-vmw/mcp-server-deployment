                echo "Tried: release tag, alternate format, release name, and git tag"
                exit 1
              fi
              FETCH_P1_TAG="$RELEASE_INFO"
            }
            echo "fetch-p1 validated: ${FETCH_P1_TAG} (source: ${FETCH_P1_SOURCE})"

            FETCH_P1_VERSION=${FETCH_P1_TAG#v}
            FETCH_P1_APP_VERSION=${FETCH_P1_VERSION//./-}
            echo "fetch_p1_release_tag=${FETCH_P1_TAG}" >> "$GITHUB_OUTPUT"
            echo "fetch_p1_version=${FETCH_P1_APP_VERSION}" >> "$GITHUB_OUTPUT"
            echo "fetch_p1_version_dotted=${FETCH_P1_VERSION}" >> "$GITHUB_OUTPUT"
