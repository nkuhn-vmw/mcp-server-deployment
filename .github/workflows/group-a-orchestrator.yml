name: group a - Orchestrator

# On-demand only — manually triggered from the Actions tab
on:
  workflow_dispatch:
    inputs:
      fetch_p1_release_tag:
        description: 'fetch-p1 release tag (e.g., v2.7.0)'
        required: false
        type: string
      gh_p1_release_tag:
        description: 'gh-p1 release tag (e.g., v2.7.0)'
        required: false
