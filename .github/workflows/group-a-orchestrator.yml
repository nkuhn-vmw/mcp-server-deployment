                if [ -z "$TAG_CHECK" ] && [[ "${FETCH_P1_TAG}" != v* ]]; then
                  TAG_CHECK=$(gh api "repos/${FETCH_P1_UPSTREAM_REPO}/git/ref/tags/v${FETCH_P1_TAG}" --jq '.ref' 2>&1) || TAG_CHECK=""
