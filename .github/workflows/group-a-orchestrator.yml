            FETCH_P1_SOURCE="release"
            echo "Validating fetch-p1 release ${FETCH_P1_TAG} in ${FETCH_P1_UPSTREAM_REPO}..."

            # Try exact tag as release first
            RELEASE_INFO=$(gh api "repos/${FETCH_P1_UPSTREAM_REPO}/releases/tags/${FETCH_P1_TAG}" --jq '.tag_name' 2>&1) || {
              RELEASE_INFO=""
              # Try with 'v' prefix if tag doesn't start with 'v'
              if [[ "${FETCH_P1_TAG}" != v* ]]; then
                ALT_TAG="v${FETCH_P1_TAG}"
                echo "Release not found, trying ${ALT_TAG}..."
                RELEASE_INFO=$(gh api "repos/${FETCH_P1_UPSTREAM_REPO}/releases/tags/${ALT_TAG}" --jq '.tag_name' 2>&1) || RELEASE_INFO=""
              else
                # Try without 'v' prefix
