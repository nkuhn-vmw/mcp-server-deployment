          FETCH_P1_TAG="${{ inputs.fetch_p1_release_tag }}"
          DEPLOY_GH_P1="${{ inputs.deploy_gh_p1 }}"
          GH_P1_TAG="${{ inputs.gh_p1_release_tag }}"
          DEPLOY_WEB_P1="${{ inputs.deploy_web_p1 }}"
          WEB_P1_TAG="${{ inputs.web_p1_release_tag }}"

          if [ "$DEPLOY_FETCH_P1" = "true" ] && [ -z "$FETCH_P1_TAG" ]; then
            echo "Error: fetch_p1_release_tag is required when deploy_fetch_p1 is enabled"
            exit 1
