          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          FETCH_P1_UPSTREAM_REPO: ${{ secrets.FETCH_P1_UPSTREAM_REPO }}
          GH_P1_UPSTREAM_REPO: ${{ secrets.GH_P1_UPSTREAM_REPO }}
          WEB_P1_UPSTREAM_REPO: ${{ secrets.WEB_P1_UPSTREAM_REPO }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
