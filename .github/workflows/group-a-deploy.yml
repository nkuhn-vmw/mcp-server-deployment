# AUTO-GENERATED by multi-target-setup.sh
# Generated on 2026-03-03
# Reusable deploy workflow for: group a
# App 1: fetch-p1 (file)
# App 2: gh-p1 (archive)
# App 3: web-p1 (file)
#
name: group a - Deploy Pack

on:
  workflow_call:
    inputs:
      environment_name:
        required: true
        type: string
      target_label:
        required: true
        type: string
      fetch_p1_release_tag:
        required: true
        type: string
      fetch_p1_version:
        required: true
        type: string
      fetch_p1_version_dotted:
        required: true
        type: string
      fetch_p1_source:
        required: true
        type: string
      deploy_fetch_p1:
        required: true
        type: string
      gh_p1_release_tag:
        required: true
        type: string
      gh_p1_version:
        required: true
        type: string
      gh_p1_version_dotted:
        required: true
        type: string
      gh_p1_source:
        required: true
        type: string
      deploy_gh_p1:
        required: true
        type: string
      web_p1_release_tag:
        required: true
        type: string
      web_p1_version:
        required: true
        type: string
      web_p1_version_dotted:
        required: true
        type: string
      web_p1_source:
        required: true
        type: string
      deploy_web_p1:
        required: true
        type: string

permissions:
  contents: write
  actions: read

env:
  CF_CLI_VERSION: "v8"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment_name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install CF CLI
        run: |
          curl -sL "https://packages.cloudfoundry.org/stable?release=linux64-binary&version=${{ env.CF_CLI_VERSION }}&source=github" | tar -zx
          chmod +x cf8

      - name: Authenticate to CF
        env:
          CF_API: ${{ secrets.CF_API }}
          CF_USER: ${{ secrets.CF_USERNAME }}
          CF_PASS: ${{ secrets.CF_PASSWORD }}
          CF_ORG: ${{ secrets.CF_ORG }}
          CF_SPACE: ${{ secrets.CF_SPACE }}
        run: |
          ./cf8 api "$CF_API"
          ./cf8 auth "$CF_USER" "$CF_PASS"
          ./cf8 target -o "$CF_ORG" -s "$CF_SPACE"
          echo "Authenticated to CF: ${CF_API} (org: ${CF_ORG}, space: ${CF_SPACE})"

      - name: Configure GitHub Authentication
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            echo "${GHE_TOKEN}" | gh auth login --hostname "${GHE_HOST}" --with-token
          else
            echo "${GHE_TOKEN}" | gh auth login --with-token
          fi

      - name: Download fetch-p1 release assets
        if: inputs.deploy_fetch_p1 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.FETCH_P1_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.FETCH_P1_ARTIFACT_PATTERN }}
          FETCH_P1_MANIFEST: ${{ secrets.FETCH_P1_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ inputs.fetch_p1_release_tag }}"
          SOURCE="${{ inputs.fetch_p1_source }}"
          VERSION_DOTTED="${{ inputs.fetch_p1_version_dotted }}"

          mkdir -p ./fetch_p1
          if [ "$SOURCE" = "tag" ]; then
            echo "Error: fetch-p1 ${TAG} exists only as a git tag (no release)."
            echo "File-type apps require a release with compiled artifacts attached."
            echo "Please create a release at the upstream repo with the artifact matching: ${ARTIFACT_PATTERN}"
            exit 1
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading fetch-p1 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./fetch_p1
          fi

          MANIFEST_PATH="${FETCH_P1_MANIFEST:-manifests/fetch_p1/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: fetch-p1 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./fetch_p1/manifest.yml
          echo "fetch-p1 release assets and manifest ready:"
          ls -la ./fetch_p1/

      - name: Deploy fetch-p1 to ${{ inputs.target_label }}
        if: inputs.deploy_fetch_p1 == 'true'
        env:
          FETCH_P1_NAME: ${{ secrets.FETCH_P1_NAME }}
          VERSION: ${{ inputs.fetch_p1_version }}
          FETCH_P1_CF_ENV_JSON: ${{ secrets.FETCH_P1_CF_ENV_JSON }}
          FETCH_P1_ROUTE: ${{ secrets.FETCH_P1_ROUTE }}
        run: |
          DEPLOY_NAME="${FETCH_P1_NAME}-${{ inputs.target_label }}-${VERSION}"
          ARTIFACT=$(ls ./fetch_p1/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with target-specific route
          sed -i "s|route:.*|route: ${FETCH_P1_ROUTE}|" ./fetch_p1/manifest.yml
          echo "Route set to: ${FETCH_P1_ROUTE}"

          if [ -n "$FETCH_P1_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch_p1/manifest.yml \
              -p "./fetch_p1/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${FETCH_P1_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./fetch_p1/manifest.yml \
              -p "./fetch_p1/${ARTIFACT}"
          fi

          echo "fetch-p1 deployed: ${DEPLOY_NAME}"

      - name: Download and extract gh-p1 release assets
        if: inputs.deploy_gh_p1 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.GH_P1_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.GH_P1_ARTIFACT_PATTERN }}
          GH_P1_MANIFEST: ${{ secrets.GH_P1_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ inputs.gh_p1_release_tag }}"
          SOURCE="${{ inputs.gh_p1_source }}"
          VERSION_DOTTED="${{ inputs.gh_p1_version_dotted }}"

          mkdir -p ./gh_p1
          if [ "$SOURCE" = "tag" ]; then
            echo "Downloading gh-p1 source archive for tag ${TAG}..."
            gh api "repos/${UPSTREAM_REPO}/tarball/${TAG}" > "./gh_p1/source.tar.gz"
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading gh-p1 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./gh_p1
          fi

          ARCHIVE=$(ls ./gh_p1/ | head -1)
          echo "Extracting ${ARCHIVE}..."
          mkdir -p ./gh_p1/extracted
          if [[ "${ARCHIVE}" == *.tar.gz ]] || [[ "${ARCHIVE}" == *.tgz ]]; then
            tar -xzf "./gh_p1/${ARCHIVE}" -C ./gh_p1/extracted
          elif [[ "${ARCHIVE}" == *.zip ]]; then
            unzip -o "./gh_p1/${ARCHIVE}" -d ./gh_p1/extracted
          else
            echo "Error: Unknown archive format: ${ARCHIVE}"
            exit 1
          fi

          MANIFEST_PATH="${GH_P1_MANIFEST:-manifests/gh_p1/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: gh-p1 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./gh_p1/extracted/manifest.yml
          echo "gh-p1 extracted contents:"
          ls -la ./gh_p1/extracted/

      - name: Deploy gh-p1 to ${{ inputs.target_label }}
        if: inputs.deploy_gh_p1 == 'true'
        env:
          GH_P1_NAME: ${{ secrets.GH_P1_NAME }}
          VERSION: ${{ inputs.gh_p1_version }}
          GH_P1_CF_ENV_JSON: ${{ secrets.GH_P1_CF_ENV_JSON }}
          GH_P1_ROUTE: ${{ secrets.GH_P1_ROUTE }}
        run: |
          DEPLOY_NAME="${GH_P1_NAME}-${{ inputs.target_label }}-${VERSION}"
          echo "Deploying ${DEPLOY_NAME} from extracted directory..."

          # Override manifest route with target-specific route
          sed -i "s|route:.*|route: ${GH_P1_ROUTE}|" ./gh_p1/extracted/manifest.yml
          echo "Route set to: ${GH_P1_ROUTE}"

          if [ -n "$GH_P1_CF_ENV_JSON" ]; then
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh_p1/extracted/manifest.yml \
              -p "./gh_p1/extracted" \
              --no-start

            echo "Setting env vars..."
            echo "${GH_P1_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./gh_p1/extracted/manifest.yml \
              -p "./gh_p1/extracted"
          fi

          echo "gh-p1 deployed: ${DEPLOY_NAME}"

      - name: Download web-p1 release assets
        if: inputs.deploy_web_p1 == 'true'
        env:
          _GHE_HOST: ${{ secrets.GHE_HOST }}
          GH_TOKEN: ${{ secrets.GHE_TOKEN }}
          UPSTREAM_REPO: ${{ secrets.WEB_P1_UPSTREAM_REPO }}
          ARTIFACT_PATTERN: ${{ secrets.WEB_P1_ARTIFACT_PATTERN }}
          WEB_P1_MANIFEST: ${{ secrets.WEB_P1_MANIFEST_PATH }}
        run: |
          [ -n "$_GHE_HOST" ] && export GH_HOST="$_GHE_HOST"
          TAG="${{ inputs.web_p1_release_tag }}"
          SOURCE="${{ inputs.web_p1_source }}"
          VERSION_DOTTED="${{ inputs.web_p1_version_dotted }}"

          mkdir -p ./web_p1
          if [ "$SOURCE" = "tag" ]; then
            echo "Error: web-p1 ${TAG} exists only as a git tag (no release)."
            echo "File-type apps require a release with compiled artifacts attached."
            echo "Please create a release at the upstream repo with the artifact matching: ${ARTIFACT_PATTERN}"
            exit 1
          else
            PATTERN=$(echo "${ARTIFACT_PATTERN}" | sed "s/{version}/${VERSION_DOTTED}/g")
            echo "Downloading web-p1 release artifact matching: ${PATTERN}"
            gh release download "${TAG}" \
              --repo "${UPSTREAM_REPO}" \
              --pattern "${PATTERN}" \
              --dir ./web_p1
          fi

          MANIFEST_PATH="${WEB_P1_MANIFEST:-manifests/web_p1/manifest.yml}"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "Error: web-p1 manifest not found at ${MANIFEST_PATH}"
            exit 1
          fi
          cp "$MANIFEST_PATH" ./web_p1/manifest.yml
          echo "web-p1 release assets and manifest ready:"
          ls -la ./web_p1/

      - name: Deploy web-p1 to ${{ inputs.target_label }}
        if: inputs.deploy_web_p1 == 'true'
        env:
          WEB_P1_NAME: ${{ secrets.WEB_P1_NAME }}
          VERSION: ${{ inputs.web_p1_version }}
          WEB_P1_CF_ENV_JSON: ${{ secrets.WEB_P1_CF_ENV_JSON }}
          WEB_P1_ROUTE: ${{ secrets.WEB_P1_ROUTE }}
        run: |
          DEPLOY_NAME="${WEB_P1_NAME}-${{ inputs.target_label }}-${VERSION}"
          ARTIFACT=$(ls ./web_p1/ | grep -v manifest.yml | head -1)
          echo "Artifact found: ${ARTIFACT}"

          # Override manifest route with target-specific route
          sed -i "s|route:.*|route: ${WEB_P1_ROUTE}|" ./web_p1/manifest.yml
          echo "Route set to: ${WEB_P1_ROUTE}"

          if [ -n "$WEB_P1_CF_ENV_JSON" ]; then
            echo "Pushing ${DEPLOY_NAME} (--no-start, env vars to inject)..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web_p1/manifest.yml \
              -p "./web_p1/${ARTIFACT}" \
              --no-start

            echo "Setting env vars..."
            echo "${WEB_P1_CF_ENV_JSON}" | jq -r 'to_entries[] | "\(.key) \(.value)"' | while read -r key value; do
              ./cf8 set-env "${DEPLOY_NAME}" "$key" "$value"
            done

            echo "Starting ${DEPLOY_NAME}..."
            ./cf8 start "${DEPLOY_NAME}"
          else
            echo "Deploying ${DEPLOY_NAME}..."
            ./cf8 push "${DEPLOY_NAME}" \
              -f ./web_p1/manifest.yml \
              -p "./web_p1/${ARTIFACT}"
          fi

          echo "web-p1 deployed: ${DEPLOY_NAME}"

      - name: Run post-deploy script
        env:
          POST_DEPLOY_SCRIPT: ${{ secrets.POST_DEPLOY_SCRIPT }}
        run: |
          if [ -n "$POST_DEPLOY_SCRIPT" ] && [ -f "$POST_DEPLOY_SCRIPT" ]; then
            chmod +x "$POST_DEPLOY_SCRIPT"
            echo "Running post-deploy script: ${POST_DEPLOY_SCRIPT}"
            ./"$POST_DEPLOY_SCRIPT" "${{ inputs.target_label }}"
          else
            echo "No post-deploy script configured, skipping"
          fi

      - name: Configure Authentication for git push
        env:
          GHE_TOKEN: ${{ secrets.GHE_TOKEN }}
          GHE_HOST: ${{ secrets.GHE_HOST }}
        run: |
          if [ -n "$GHE_HOST" ]; then
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@${GHE_HOST}/${{ github.repository }}.git"
          else
            git remote set-url origin "https://x-access-token:${GHE_TOKEN}@github.com/${{ github.repository }}.git"
          fi

      - name: Record ${{ inputs.target_label }} deployed versions
        env:
          FETCH_P1_NAME: ${{ secrets.FETCH_P1_NAME }}
          GH_P1_NAME: ${{ secrets.GH_P1_NAME }}
          WEB_P1_NAME: ${{ secrets.WEB_P1_NAME }}
        run: |
          DEPLOY_FETCH_P1="${{ inputs.deploy_fetch_p1 }}"
          DEPLOY_GH_P1="${{ inputs.deploy_gh_p1 }}"
          DEPLOY_WEB_P1="${{ inputs.deploy_web_p1 }}"

          CHANGED=false

          git pull --rebase || true

          if [ "$DEPLOY_FETCH_P1" = "true" ]; then
            echo "${{ inputs.fetch_p1_release_tag }}" > ".last-deployed-${FETCH_P1_NAME}-${{ inputs.target_label }}"
            git add ".last-deployed-${FETCH_P1_NAME}-${{ inputs.target_label }}"
            CHANGED=true
          fi

          if [ "$DEPLOY_GH_P1" = "true" ]; then
            echo "${{ inputs.gh_p1_release_tag }}" > ".last-deployed-${GH_P1_NAME}-${{ inputs.target_label }}"
            git add ".last-deployed-${GH_P1_NAME}-${{ inputs.target_label }}"
            CHANGED=true
          fi

          if [ "$DEPLOY_WEB_P1" = "true" ]; then
            echo "${{ inputs.web_p1_release_tag }}" > ".last-deployed-${WEB_P1_NAME}-${{ inputs.target_label }}"
            git add ".last-deployed-${WEB_P1_NAME}-${{ inputs.target_label }}"
            CHANGED=true
          fi

          if [ "$CHANGED" = "true" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            MSG="Record ${{ inputs.target_label }} deployment:"
            if [ "$DEPLOY_FETCH_P1" = "true" ]; then
              MSG="${MSG} ${FETCH_P1_NAME}=${{ inputs.fetch_p1_release_tag }}"
            fi
            if [ "$DEPLOY_GH_P1" = "true" ]; then
              MSG="${MSG} ${GH_P1_NAME}=${{ inputs.gh_p1_release_tag }}"
            fi
            if [ "$DEPLOY_WEB_P1" = "true" ]; then
              MSG="${MSG} ${WEB_P1_NAME}=${{ inputs.web_p1_release_tag }}"
            fi

            git diff --cached --quiet || git commit -m "${MSG}"

            # Retry push in case parallel prod deployments conflict
            MAX_RETRIES=3
            for attempt in $(seq 1 $MAX_RETRIES); do
              if git push; then
                echo "Version tracking pushed (attempt $attempt)"
                break
              fi
              if [ $attempt -eq $MAX_RETRIES ]; then
                echo "::warning::Could not push version tracking after $MAX_RETRIES attempts"
              else
                echo "Push failed, retrying after pull..."
                sleep $((attempt * 2))
                git pull --rebase || true
              fi
            done
          fi
